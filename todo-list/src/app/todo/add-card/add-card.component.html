<form class="note-card">
  <div class="note-title">
    <input
      type="text"
      [(ngModel)]="note.title"
      name="title"
      placeholder="Enter title"
    />
  </div>
  <div class="note-content">
    <textarea
      name="content"
      [(ngModel)]="note.content"
      placeholder="Enter content"
    ></textarea>
  </div>
  <div class="note-actions">
    <button class="add-btn" (click)="OnaAddtoNote()">ADD</button>
  </div>
</form>
