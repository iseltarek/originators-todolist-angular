<div class="note-card">
  <h3 class="note-title">{{ note.title }}</h3>
  <p class="note-content">{{ note.content }}</p>
  <div class="note-actions">
    <button class="delete-btn" (onclick)="deletenote()">Delete</button>
    <button class="delete-btn" (onclick)="editnote()">Edit</button>
  </div>
</div>
