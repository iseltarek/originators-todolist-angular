<div class="note-card">
  <h3 class="note-title">{{ note.title }}</h3>
  <mat-checkbox
    (change)="onCheckChange($event)"
    class="checkbox"
  ></mat-checkbox>
  <div class="note-actions">
    <button class="delete-btn" (click)="OnDeleteNote()">Delete</button>
    <button class="delete-btn" (click)="editnote()">Edit</button>
  </div>
</div>
